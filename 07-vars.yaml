- name: demo on prompt
  hosts: local
  connection: local
  vars_prompt: 
    - name: username
      prompt: "Please enter username"
      private: false

    - name: password
      prompt: "Please enter password"
      private: true # → to make the password invisible

  tasks:
  - name: print information
    debug:
      msg: "Username is: {{ username }}, password is: {{ password }}"
